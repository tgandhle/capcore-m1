name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast gate: run the full test suite on every push/PR across supported
  # Python versions and both Linux and Windows (the project's dev platform).
  tests:
    name: tests (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable, with test extra)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run tests
        run: python -m pytest -q

  # Slower gate: the mutation check reintroduces each known defect and asserts
  # the suite catches it. Runs once (Linux, one Python) because it takes several
  # minutes and the matrix would multiply that by eight.
  #
  # NOT because it is platform-independent. It is not, and this comment used to say
  # so. Review 9 disproved it: a test can be green on one interpreter and red on
  # another for the same defect (3.14 parses 10000-deep JSON that 3.11-3.13 reject),
  # so a mutation guarding it could be caught on some interpreters and survive on
  # others. Running on 3.12 only is a COST decision, and the residual risk is real.
  # The mitigation is upstream, in how mutations are written: prefer controls that
  # are pure functions of their input (a nesting cap) over ones that depend on
  # interpreter behaviour (catching RecursionError).
  mutation-check:
    name: mutation check
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (editable, with test extra)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Check mutation anchors (fast, no tests)
        run: python scripts/check_stale.py
      - name: Run mutation check
        run: python scripts/mutation_check.py
