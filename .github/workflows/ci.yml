name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast gate: run the full test suite on every push/PR across supported
  # Python versions and both Linux and Windows (the project's dev platform).
  tests:
    name: tests (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable, with test extra)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run tests
        run: python -m pytest -q

  # Slower gate: the mutation check reintroduces each known defect and asserts
  # the suite catches it. Runs once (Linux, one Python) since it is
  # platform-independent and takes a couple of minutes.
  mutation-check:
    name: mutation check
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (editable, with test extra)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run mutation check
        run: python scripts/mutation_check.py
